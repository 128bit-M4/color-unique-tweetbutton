<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color-Unique-tweetbtn</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="app.js" defer></script>
</head>
<body>

    <div class="audio-placement">
        <button id="audioMasterBtn" class="btn-sound active" onclick="window.toggleAudioMaster()">Sound ON</button>
    </div>

    <div class="header-area">
        <h1 class="main-title">Color-Unique-tweetbtn</h1>
        <div class="credit-text">
            このサイトの作成者<br>
            @128bit_M4
        </div>
    </div>

    <div class="container-play" id="activePlayArea" style="display: none;">
        <h2 class="section-title" id="playingTitle">選択中のボタン</h2>
        <div class="play-zone">
            <div id="targetButton" class="play-btn" onclick="window.startRouletteOverlay()">ボタンを押してスタート</div>
        </div>
        <button class="btn-form btn-back" onclick="window.closePlayArea()">一覧に戻る</button>
    </div>

    <div class="main-content-wrapper">
        
        <div class="content-left">
            <h2 class="section-title">新規ルーレットボタンを作成</h2>
            
            <div class="form-row">
                <span class="form-label">ボタンの名前</span>
                <input type="text" id="btnName" class="input-cute" placeholder="例：今日の運勢占い">
            </div>

            <div class="form-row">
                <span class="form-label">ボタンの色</span>
                <div class="color-preview-box"></div> </div>

            <div class="form-row">
                <span class="form-label">選択肢の内容</span>
                <div class="options-container" id="optionsGroup">
                    <div class="option-item-row">
                        <input type="text" class="roulette-option-input input-cute" placeholder="例：とても良い">
                    </div>
                    <div class="option-item-row">
                        <input type="text" class="roulette-option-input input-cute" placeholder="例：普通">
                        <button type="button" class="btn-plus" onclick="window.addOptionField()">+</button>
                    </div>
                </div>
            </div>

            <div class="form-row" style="margin-top: 30px;">
                <button class="btn-form btn-submit" id="submitBtn" onclick="window.createNewButton()">ボタン作成！</button>
            </div>
        </div>

        <div class="vertical-divider"></div>

        <div class="content-right" id="listArea">
            <h2 class="section-title">ルーレットボタン一覧</h2>
            <div class="button-list" id="buttonListContainer">
                </div>
        </div>
    </div>

    <div class="overlay" id="rouletteOverlay">
        <div class="roulette-box">
            <h2 id="rouletteTitle">抽選中</h2>
            <div id="canvasContainer">
                <div id="arrow"></div>
                <canvas id="wheelCanvas" width="300" height="300"></canvas>
            </div>
            <div id="resultOutput" class="result-title">- - -</div>
            <button id="spinBtn" class="btn-form btn-submit" onclick="window.spinWheel()">ルーレットを開始</button>
            <a id="twitterLink" class="btn-twitter-share" href="#" target="_blank" style="display: none;">結果をツイートする</a>
            <button id="closeBtn" class="btn-form btn-back" onclick="window.closeOverlay()" style="display:none; margin-top:10px;">閉じる</button>
        </div>
    </div>

    <div class="overlay" id="shareModalOverlay">
        <div class="roulette-box" style="text-align: left;">
            <h3 style="margin-top: 0; color: #1a365d;">このボタンの共有リンク</h3>
            <p style="font-size: 0.85rem; color: #4a5568; margin-bottom: 15px;">URLをコピーするか、直接Xに投稿できます。</p>
            <input type="text" id="generatedUrlInput" class="input-cute" readonly onclick="this.select()" style="background: #fff; margin-bottom: 15px;">
            <div style="display: flex; gap: 10px;">
                <button class="btn-form btn-submit" onclick="window.copyShareUrl()" style="flex: 1; padding: 10px;">URLをコピー</button>
                <a id="shareFormXLink" class="btn-twitter-share" href="#" target="_blank" style="flex: 1; padding: 10px; text-align: center; text-decoration: none;">Xで開く</a>
            </div>
            <button class="btn-form btn-back" onclick="window.closeShareModal()" style="margin-top: 15px; width: 100%;">閉じる</button>
        </div>
    </div>

    <div class="overlay" id="audioPromptOverlay" style="display: flex;">
        <div class="roulette-box">
            <h3 style="margin-top: 0;">サウンド確認</h3>
            <p style="font-size: 0.9rem; color: #4a5568; line-height: 1.5; margin-bottom: 20px;">
                このサイトはルーレット時などに可愛い効果音が流れます。音声をONにして楽しんでください。
            </p>
            <button class="btn-form btn-submit" onclick="window.initAudio(true)" style="margin-bottom: 10px;">音声をONにして進む</button>
            <button class="btn-form btn-back" onclick="window.initAudio(false)" style="width: 100%;">消音のまま進む</button>
        </div>
    </div>

</body>
</html>
